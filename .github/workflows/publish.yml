name: 发布签名桌面版本

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（必须与源码中的版本一致，如 0.2.0）"
        required: true
        type: string
      source_ref:
        description: "私有源码仓库的分支、标签或提交"
        required: true
        default: "main"
        type: string
      release_notes:
        description: "本次更新说明"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: 构建 Windows x64
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: 读取私有源码
        uses: actions/checkout@v4
        with:
          repository: zeyu06408-gif/document-quality-inspector
          ref: ${{ inputs.source_ref }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 配置 pnpm
        id: pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.34.4 --activate
          echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: 恢复 pnpm 缓存
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 配置 Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: 恢复 Rust 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-x86_64-pc-windows-msvc-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ matrix.rust_target }}-

      - name: 核对版本号
        shell: bash
        run: |
          node -e 'const fs=require("fs"); const expected=process.env.RELEASE_VERSION; const pkg=JSON.parse(fs.readFileSync("package.json")); const conf=JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json")); const cargo=fs.readFileSync("src-tauri/Cargo.toml","utf8").match(/^version = "([^"]+)"/m)?.[1]; const versions=[pkg.version,conf.version,cargo]; if(versions.some(v=>v!==expected)){console.error(`版本不一致：期望 ${expected}，实际 ${versions.join(" / ")}`); process.exit(1)}'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: 整理 Windows 发布文件
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installer = Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $installer.FullName "release-assets/document-quality-inspector_${env:RELEASE_VERSION}_x64-setup.exe"
          Copy-Item "$($installer.FullName).sig" "release-assets/document-quality-inspector_${env:RELEASE_VERSION}_x64-setup.exe.sig"

      - name: 暂存平台产物
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/*
          if-no-files-found: error
          retention-days: 3

  publish:
    name: 验证并发布
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
    steps:
      - name: 读取更新仓库
        uses: actions/checkout@v4
        with:
          path: publisher

      - name: 汇总构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: 生成更新清单
        shell: bash
        run: |
          set -euo pipefail
          windows_file="document-quality-inspector_${RELEASE_VERSION}_x64-setup.exe"
          windows_cdn_file="${windows_file}.bin"
          cdn_base="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/updates/v${RELEASE_VERSION}"
          jq -n \
            --arg version "$RELEASE_VERSION" \
            --arg notes "$RELEASE_NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg windows_signature "$(tr -d '\r\n' < "release-assets/${windows_file}.sig")" \
            --arg windows_url "${cdn_base}/${windows_cdn_file}" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:{"windows-x86_64":{signature:$windows_signature,url:$windows_url}}}' \
            > release-assets/latest.json

      - name: 发布大陆可访问的 CDN 文件
        shell: bash
        run: |
          set -euo pipefail
          git -C publisher pull --rebase origin main
          version_dir="publisher/updates/v${RELEASE_VERSION}"
          mkdir -p "$version_dir"
          cp release-assets/document-quality-inspector_${RELEASE_VERSION}_x64-setup.exe \
            "$version_dir/document-quality-inspector_${RELEASE_VERSION}_x64-setup.exe.bin"
          cp release-assets/latest.json publisher/latest.json
          cd publisher
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json "updates/v${RELEASE_VERSION}"
          git commit -m "release: publish CDN files for ${RELEASE_VERSION}"
          git push origin HEAD:main

      - name: 刷新 CDN 更新清单
        shell: bash
        run: |
          for path in \
            "latest.json" \
            "updates/v${RELEASE_VERSION}/document-quality-inspector_${RELEASE_VERSION}_x64-setup.exe.bin"
          do
            curl --fail --silent --show-error \
              "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/${path}"
          done

      - name: 验证客户端更新地址
        shell: bash
        run: |
          set -euo pipefail
          raw_endpoint="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/latest.json"
          actual=""
          for attempt in $(seq 1 6); do
            actual="$(curl --fail --silent --show-error \
              -H 'Cache-Control: no-cache' \
              "${raw_endpoint}?run=${GITHUB_RUN_ID}-${attempt}" | jq -r '.version // empty' || true)"
            if [ "$actual" = "$RELEASE_VERSION" ]; then
              echo "低缓存客户端更新地址已返回 ${RELEASE_VERSION}"
              break
            fi
            echo "第 ${attempt} 次 Raw 校验仍返回 ${actual:-无版本}，5 秒后重试"
            sleep 5
          done
          if [ "$actual" != "$RELEASE_VERSION" ]; then
            echo "低缓存客户端更新地址未返回 ${RELEASE_VERSION}，拒绝宣告发布成功" >&2
            exit 1
          fi

          cdn_endpoint="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/latest.json"
          cdn_actual="$(curl --fail --silent --show-error "$cdn_endpoint" | jq -r '.version // empty' || true)"
          if [ "$cdn_actual" = "$RELEASE_VERSION" ]; then
            echo "CDN 备用更新地址已返回 ${RELEASE_VERSION}"
          else
            echo "::warning::CDN 备用更新地址暂时返回 ${cdn_actual:-无版本}；已发布的 Raw 主更新地址正常，不阻断 Release。"
          fi

      - name: 创建 GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          tag="app-v${RELEASE_VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "版本 ${tag} 已存在，拒绝覆盖。" >&2
            exit 1
          fi
          gh release create "$tag" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "文书质检 v${RELEASE_VERSION}" \
            --notes "$RELEASE_NOTES" \
            --latest
